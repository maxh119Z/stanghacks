<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrainGuard — Get Started</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a14;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .page {
      width: 100%;
      max-width: 480px;
      padding: 40px 20px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 { font-size: 28px; }
    .logo p { color: #94a3b8; font-size: 14px; margin-top: 6px; }

    .card {
      background: #13131f;
      border-radius: 16px;
      padding: 28px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .tabs {
      display: flex; gap: 0; margin-bottom: 24px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .tab {
      flex: 1; padding: 10px; text-align: center;
      font-size: 13px; font-weight: 600; color: #64748b;
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab.active { color: #a5b4fc; border-bottom-color: #6366f1; }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: #94a3b8; margin-bottom: 6px;
    }
    input, textarea, select {
      width: 100%; padding: 11px 13px; background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
      color: #e2e8f0; font-size: 14px; font-family: inherit; outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus, select:focus { border-color: #6366f1; }
    textarea { resize: vertical; min-height: 70px; }
    .help { font-size: 11px; color: #475569; margin-top: 5px; }

    .profile-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .profile-section h3 {
      font-size: 13px; font-weight: 700; color: #a5b4fc;
      margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px;
    }

    .btn {
      display: block; width: 100%; padding: 13px; border-radius: 10px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      border: none; transition: all 0.2s; margin-top: 20px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white;
    }
    .btn:hover { box-shadow: 0 4px 20px rgba(99,102,241,0.4); transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    .error {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5; padding: 10px 14px; border-radius: 8px;
      font-size: 13px; margin-bottom: 16px; display: none;
    }
    .success {
      background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2);
      color: #6ee7b7; padding: 10px 14px; border-radius: 8px;
      font-size: 13px; text-align: center; display: none;
    }
    .success a { color: #a5b4fc; }
  </style>
</head>
<body>
  <div class="page">
    <div class="logo">
      <h1>🧠 BrainGuard</h1>
      <p>Set up your profile so we can personalize your experience</p>
    </div>

    <div class="card">
      <div class="tabs">
        <div class="tab active" data-tab="signup">Sign Up</div>
        <div class="tab" data-tab="login">Log In</div>
      </div>

      <div id="errorMsg" class="error"></div>
      <div id="successMsg" class="success"></div>

      <!-- Sign Up Form -->
      <div id="signupForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="you@school.edu">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="At least 6 characters">
        </div>
        <div class="form-group">
          <label>Display Name</label>
          <input type="text" id="displayName" placeholder="Your name">
        </div>

        <div class="profile-section">
          <h3>Your Profile</h3>
          <div class="form-group">
            <label>Your Classes</label>
            <textarea id="classes" placeholder="AP Calculus BC, AP English Lit, AP CS A, Physics, US History"></textarea>
            <p class="help">Comma-separated. Helps BrainGuard understand what you should know.</p>
          </div>
          <div class="form-group">
            <label>Level</label>
            <select id="difficulty">
              <option value="middle_school">Middle School</option>
              <option value="high_school" selected>High School</option>
              <option value="ap_honors">AP / Honors</option>
              <option value="college">College</option>
            </select>
          </div>
        </div>

        <button class="btn" id="signupBtn">Create Account & Start</button>
      </div>

      <!-- Login Form -->
      <div id="loginForm" style="display: none;">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@school.edu">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword">
        </div>
        <button class="btn" id="loginBtn">Log In</button>
      </div>
    </div>
  </div>

  <script src="signup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #1e1e1e; color: #d4d4d4; }

    .header { padding: 14px 16px; background: #252526; border-bottom: 1px solid #3e3e42; }
    .header h1 { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #d4d4d4; }
    .header p { font-size: 11px; color: #6a6a6a; margin-top: 2px; }

    .auth-section { padding: 14px 16px; border-bottom: 1px solid #3e3e42; }
    .google-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 9px; background: #fff; color: #333; font-size: 12px; font-weight: 600; border: none; cursor: pointer; }
    .google-btn:hover { background: #f0f0f0; }
    .google-btn svg { width: 16px; height: 16px; }

    .user-row { display: flex; align-items: center; gap: 10px; }
    .user-avatar { width: 28px; height: 28px; background: #3e3e42; border: 1px solid #4a4a4f; }
    .user-info { flex: 1; overflow: hidden; }
    .user-name { font-size: 13px; font-weight: 600; color: #d4d4d4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-email { font-size: 10px; color: #6a6a6a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .signout-btn { background: none; border: 1px solid #3e3e42; color: #969696; cursor: pointer; font-size: 10px; padding: 3px 8px; }
    .signout-btn:hover { background: #2d2d30; color: #d4d4d4; }

    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid #3e3e42; background: #252526; }
    .toggle-row label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #969696; }
    .toggle { position: relative; width: 36px; height: 20px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #3e3e42; cursor: pointer; transition: 0.2s; }
    .slider::before { content: ""; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: #969696; transition: 0.2s; }
    .toggle input:checked + .slider { background: #4ec9b0; }
    .toggle input:checked + .slider::before { transform: translateX(16px); background: #1e1e1e; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; border-bottom: 1px solid #3e3e42; }
    .stat { text-align: center; padding: 14px 8px; border-right: 1px solid #3e3e42; }
    .stat:last-child { border-right: none; }
    .stat-num { font-size: 20px; font-weight: 700; color: #d4d4d4; }
    .stat-label { font-size: 9px; color: #6a6a6a; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    .section { padding: 12px 16px; border-bottom: 1px solid #3e3e42; }
    .section label { display: block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #969696; margin-bottom: 5px; }
    input[type="password"], input[type="text"] {
      width: 100%; padding: 7px 10px; background: #2d2d30; border: 1px solid #3e3e42;
      color: #d4d4d4; font-size: 12px; outline: none; font-family: inherit;
    }
    input[type="password"] { font-family: "Consolas", "Courier New", monospace; }
    input:focus { border-color: #4ec9b0; }
    .help { font-size: 10px; color: #6a6a6a; margin-top: 3px; }

    .btn-row { padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; }
    .btn { display: block; width: 100%; padding: 9px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; cursor: pointer; text-align: center; border: none; }
    .btn-primary { background: #4ec9b0; color: #1e1e1e; }
    .btn-primary:hover { background: #3db89f; }
    .btn-secondary { background: #2d2d30; color: #d4d4d4; border: 1px solid #3e3e42; }
    .btn-secondary:hover { background: #333336; }
    .btn-ghost { background: none; color: #6a6a6a; font-size: 10px; border: none; padding: 4px; text-decoration: underline; }
    .btn-ghost:hover { color: #969696; }

    .status-bar { padding: 10px 16px; border-bottom: 1px solid #3e3e42; display: flex; gap: 6px; align-items: center; }
    .status-bar input { flex: 1; padding: 6px 8px; background: #2d2d30; border: 1px solid #3e3e42; color: #d4d4d4; font-size: 11px; outline: none; }
    .status-bar input:focus { border-color: #4ec9b0; }
    .status-bar input::placeholder { color: #4a4a4f; }
    .status-btn { background: #3e3e42; border: none; color: #969696; font-size: 10px; padding: 6px 8px; cursor: pointer; font-weight: 600; }
    .status-btn:hover { background: #4a4a4f; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Think</h1>
    <p>Think first, prompt second</p>
  </div>

  <div class="auth-section" id="loggedOutView">
    <button class="google-btn" id="googleSignInBtn">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
  </div>

  <div class="auth-section hidden" id="loggedInView">
    <div class="user-row">
      <img class="user-avatar" id="userAvatar" src="" alt="">
      <div class="user-info">
        <div class="user-name" id="userName">-</div>
        <div class="user-email" id="userEmail">-</div>
      </div>
      <button class="signout-btn" id="signOutBtn">Sign out</button>
    </div>
  </div>

  <!-- Current Status -->
  <div class="status-bar hidden" id="statusBar">
    <input type="text" id="currentStatus" placeholder="What are you working on? e.g. studying for calc test">
    <button class="status-btn" id="statusSaveBtn">Set</button>
  </div>

  <div class="toggle-row">
    <label>Active</label>
    <div class="toggle"><input type="checkbox" id="enabled" checked><span class="slider"></span></div>
  </div>

  <div class="stats-grid">
    <div class="stat"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Prompts</div></div>
    <div class="stat"><div class="stat-num" id="statNudged">0</div><div class="stat-label">Nudged</div></div>
    <div class="stat"><div class="stat-num" id="statClean">0</div><div class="stat-label">Clean</div></div>
  </div>

  <div class="section">
    <label>OpenAI API Key (local only)</label>
    <input type="password" id="apiKey" placeholder="sk-...">
    <p class="help">gpt-4o-mini. Never leaves your device.</p>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="saveBtn">Save</button>
    <button class="btn btn-secondary" id="dashboardBtn">Dashboard</button>
    <button class="btn btn-ghost" id="resetBtn">Reset all stats</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>

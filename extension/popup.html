<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 340px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0f1a; color: #e2e8f0; }

    .header { padding: 18px 20px; background: linear-gradient(135deg, #1e1b4b, #312e81); border-bottom: 1px solid rgba(99,102,241,0.15); }
    .header h1 { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .header p { font-size: 11px; color: #a5b4fc; margin-top: 3px; }

    /* Auth section */
    .auth-section { padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .user-row { display: flex; align-items: center; gap: 10px; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #312e81; }
    .user-info { flex: 1; }
    .user-name { font-size: 13px; font-weight: 600; }
    .user-email { font-size: 11px; color: #94a3b8; }
    .signout-btn { background: none; border: none; color: #6366f1; cursor: pointer; font-size: 11px; }

    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 10px; border-radius: 8px;
      background: white; color: #333; font-size: 13px; font-weight: 600;
      border: none; cursor: pointer; transition: all 0.2s;
    }
    .google-btn:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .google-btn svg { width: 18px; height: 18px; }

    /* Toggle */
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .toggle-row label { font-size: 13px; font-weight: 600; }
    .toggle { position: relative; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #334155; border-radius: 22px; cursor: pointer; transition: 0.3s; }
    .slider::before { content: ""; position: absolute; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s; }
    .toggle input:checked + .slider { background: #6366f1; }
    .toggle input:checked + .slider::before { transform: translateX(18px); }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 14px 20px; background: rgba(99,102,241,0.03); }
    .stat { text-align: center; }
    .stat-num { font-size: 22px; font-weight: 700; color: #a5b4fc; }
    .stat-label { font-size: 9px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Form */
    .section { padding: 14px 20px; }
    .section label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; margin-bottom: 5px; }
    input[type="password"] {
      width: 100%; padding: 9px 11px; background: #1e1e2f; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 7px; color: #e2e8f0; font-size: 12px; outline: none;
    }
    input:focus { border-color: #6366f1; }
    .help { font-size: 10px; color: #475569; margin-top: 5px; }

    .divider { height: 1px; background: rgba(255,255,255,0.04); }

    .btn-row { padding: 14px 20px; display: flex; flex-direction: column; gap: 8px; }
    .btn { display: block; width: 100%; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; border: none; transition: all 0.2s; }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; }
    .btn-secondary { background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid rgba(255,255,255,0.08); }
    .btn-ghost { background: none; color: #64748b; font-size: 11px; border: none; padding: 6px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Think</h1>
    <p>Think first, prompt second</p>
  </div>

  <!-- Logged out state -->
  <div class="auth-section" id="loggedOutView">
    <button class="google-btn" id="googleSignInBtn">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
  </div>

  <!-- Logged in state -->
  <div class="auth-section hidden" id="loggedInView">
    <div class="user-row">
      <img class="user-avatar" id="userAvatar" src="" alt="">
      <div class="user-info">
        <div class="user-name" id="userName">-</div>
        <div class="user-email" id="userEmail">-</div>
      </div>
      <button class="signout-btn" id="signOutBtn">Sign out</button>
    </div>
  </div>

  <!-- Toggle -->
  <div class="toggle-row">
    <label>Active</label>
    <div class="toggle"><input type="checkbox" id="enabled" checked><span class="slider"></span></div>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Prompts</div></div>
    <div class="stat"><div class="stat-num" id="statNudged">0</div><div class="stat-label">Nudged</div></div>
    <div class="stat"><div class="stat-num" id="statClean">0</div><div class="stat-label">Clean</div></div>
  </div>

  <div class="divider"></div>

  <!-- API Key (always local) -->
  <div class="section">
    <label>OpenAI API Key (stored locally only)</label>
    <input type="password" id="apiKey" placeholder="sk-...">
    <p class="help">Uses gpt-4o-mini. Never sent to Firebase.</p>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="saveBtn">Save</button>
    <button class="btn btn-secondary" id="dashboardBtn">Open Dashboard</button>
    <button class="btn btn-ghost" id="resetBtn">Reset stats</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>

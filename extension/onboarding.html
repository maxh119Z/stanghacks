<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrainGuard — Set Up Your Profile</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a14; color: #e2e8f0;
    }
    .page { width: 100%; max-width: 500px; padding: 40px 20px; }

    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 28px; }
    .logo p { color: #94a3b8; font-size: 14px; margin-top: 6px; }

    .user-preview {
      display: flex; align-items: center; gap: 14px; justify-content: center; margin-bottom: 28px;
    }
    .user-preview img { width: 48px; height: 48px; border-radius: 50%; border: 2px solid rgba(99,102,241,0.3); }
    .user-preview .info { text-align: left; }
    .user-preview .name { font-size: 16px; font-weight: 600; }
    .user-preview .email { font-size: 12px; color: #94a3b8; }

    .card {
      background: #13131f; border-radius: 16px; padding: 28px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .card h2 {
      font-size: 14px; font-weight: 700; color: #a5b4fc;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 18px;
    }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: #94a3b8; margin-bottom: 6px;
    }
    input, textarea, select {
      width: 100%; padding: 12px 14px; background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
      color: #e2e8f0; font-size: 14px; font-family: inherit; outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus, select:focus { border-color: #6366f1; }
    textarea { resize: vertical; min-height: 80px; }
    .help { font-size: 11px; color: #475569; margin-top: 5px; }

    .btn {
      display: block; width: 100%; padding: 14px; border-radius: 10px;
      font-size: 16px; font-weight: 600; cursor: pointer; border: none;
      background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white;
      margin-top: 24px; transition: all 0.2s;
    }
    .btn:hover { box-shadow: 0 4px 20px rgba(99,102,241,0.4); transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    .error { color: #fca5a5; font-size: 13px; margin-top: 10px; display: none; }

    .success {
      text-align: center; padding: 40px 0;
    }
    .success .icon { font-size: 52px; margin-bottom: 16px; }
    .success h2 { font-size: 22px; margin-bottom: 8px; }
    .success p { color: #94a3b8; font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="page">
    <div class="logo">
      <h1>🧠 BrainGuard</h1>
      <p>One more step — tell us about yourself</p>
    </div>

    <div class="user-preview" id="userPreview" style="display:none;">
      <img id="previewAvatar" src="" alt="">
      <div class="info">
        <div class="name" id="previewName">-</div>
        <div class="email" id="previewEmail">-</div>
      </div>
    </div>

    <div class="card" id="formCard">
      <h2>Your Profile</h2>

      <div class="form-group">
        <label>Display Name</label>
        <input type="text" id="displayName" placeholder="Your name">
      </div>

      <div class="form-group">
        <label>Your Classes</label>
        <textarea id="classes" placeholder="AP Calculus BC, AP English Lit, AP CS A, Physics, US History..."></textarea>
        <p class="help">Comma-separated. This is how BrainGuard knows what you should be able to figure out.</p>
      </div>

      <div class="form-group">
        <label>Level</label>
        <select id="difficulty">
          <option value="middle_school">Middle School</option>
          <option value="high_school" selected>High School</option>
          <option value="ap_honors">AP / Honors</option>
          <option value="college">College</option>
        </select>
      </div>

      <div class="form-group">
        <label>Sensitivity</label>
        <select id="sensitivity">
          <option value="1">Chill — only block obvious stuff</option>
          <option value="2" selected>Balanced — nudge when borderline</option>
          <option value="3">Strict — make me try almost everything</option>
        </select>
      </div>

      <div id="errorMsg" class="error"></div>

      <button class="btn" id="saveBtn">Save & Start Using BrainGuard</button>
    </div>
  </div>

  <script src="onboarding.js"></script>
</body>
</html>

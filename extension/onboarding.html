<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Think — Set Up Your Profile</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #1e1e1e; color: #d4d4d4; }
    .page { width: 100%; max-width: 480px; padding: 40px 20px; }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 18px; text-transform: uppercase; letter-spacing: 0.5px; color: #d4d4d4; }
    .logo p { color: #6a6a6a; font-size: 13px; margin-top: 6px; }
    .user-preview { display: flex; align-items: center; gap: 14px; justify-content: center; margin-bottom: 28px; }
    .user-preview img { width: 44px; height: 44px; border: 1px solid #4a4a4f; }
    .user-preview .info { text-align: left; }
    .user-preview .name { font-size: 15px; font-weight: 600; color: #d4d4d4; }
    .user-preview .email { font-size: 12px; color: #6a6a6a; }
    .card { background: #252526; border: 1px solid #3e3e42; padding: 28px; }
    .card h2 { font-size: 11px; color: #969696; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 20px; border-bottom: 1px solid #3e3e42; padding-bottom: 8px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #969696; margin-bottom: 6px; }
    input, textarea, select { width: 100%; padding: 11px 12px; background: #2d2d30; border: 1px solid #3e3e42; color: #d4d4d4; font-size: 13px; font-family: inherit; outline: none; }
    input:focus, textarea:focus, select:focus { border-color: #4ec9b0; }
    textarea { resize: vertical; min-height: 80px; }
    .help { font-size: 11px; color: #6a6a6a; margin-top: 5px; line-height: 1.4; }
    .btn { display: block; width: 100%; padding: 14px; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; cursor: pointer; border: none; background: #4ec9b0; color: #1e1e1e; margin-top: 24px; }
    .btn:hover { background: #3db89f; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .error { color: #f14c4c; font-size: 13px; margin-top: 10px; display: none; border: 1px solid #f14c4c; padding: 8px 12px; background: rgba(241,76,76,0.08); }
    .success { text-align: center; padding: 40px 0; }
    .success h2 { font-size: 20px; margin-bottom: 8px; color: #d4d4d4; }
    .success p { color: #6a6a6a; font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="page">
    <div class="logo"><h1>Think</h1><p>Personalize for better classification</p></div>
    <div class="user-preview" id="userPreview" style="display:none;">
      <img id="previewAvatar" src="" alt="">
      <div class="info"><div class="name" id="previewName">-</div><div class="email" id="previewEmail">-</div></div>
    </div>
    <div class="card" id="formCard">
      <h2>Your Profile</h2>
      <div class="form-group"><label>Name</label><input type="text" id="displayName" placeholder="Your name"></div>
      <div class="form-group"><label>Your Classes</label><textarea id="classes" placeholder="AP Calculus BC, AP English Lit, AP CSA, Physics 1, US History..."></textarea><p class="help">Comma-separated.</p></div>
      <div class="form-group"><label>Level</label><select id="difficulty"><option value="middle_school">Middle School</option><option value="high_school" selected>High School</option><option value="ap_honors">AP / Honors</option><option value="college">College</option></select></div>
      <div class="form-group"><label>Sensitivity</label><select id="sensitivity"><option value="1">Chill — only block obvious stuff</option><option value="2" selected>Balanced — nudge when borderline</option><option value="3">Strict — make me try almost everything</option></select></div>
      <div class="form-group"><label>Current Status (optional)</label><input type="text" id="currentStatusOnboard" placeholder="e.g. studying for calc test"><p class="help">What you're working on right now. Can change anytime in popup.</p></div>
      <div id="errorMsg" class="error"></div>
      <button class="btn" id="saveBtn">Start Thinking</button>
    </div>
  </div>
  <script src="onboarding.js"></script>
</body>
</html>

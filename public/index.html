<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Think</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#1e1e1e;color:#d4d4d4;line-height:1.5}.nav{display:flex;align-items:center;justify-content:space-between;padding:12px 28px;background:#252526;border-bottom:1px solid #3e3e42}.nav-brand{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}.nav-right{display:flex;align-items:center;gap:12px;font-size:13px;color:#969696}.nav-right img{width:28px;height:28px;border:1px solid #4a4a4f}.nav-right button{background:#2d2d30;border:1px solid #3e3e42;color:#969696;cursor:pointer;font-size:12px;padding:5px 12px}.auth-screen{max-width:380px;margin:100px auto;text-align:center;padding:32px;background:#252526;border:1px solid #3e3e42}.auth-screen h1{font-size:18px;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}.auth-screen p{color:#6a6a6a;margin-bottom:24px;font-size:13px}.google-btn{display:inline-flex;align-items:center;gap:10px;padding:10px 20px;background:#fff;color:#333;font-size:13px;font-weight:600;border:none;cursor:pointer}.google-btn:hover{background:#f0f0f0}.google-btn svg{width:18px;height:18px}.container{max-width:960px;margin:0 auto;padding:24px}.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.stat-card{background:#252526;border:1px solid #3e3e42;padding:18px;text-align:center}.stat-card .num{font-size:30px;font-weight:700}.stat-card .label{font-size:11px;color:#6a6a6a;text-transform:uppercase;margin-top:4px}.card{background:#252526;border:1px solid #3e3e42;padding:20px;margin-bottom:16px}.card h2{font-size:11px;font-weight:600;color:#969696;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #3e3e42;text-transform:uppercase;letter-spacing:.5px}.bar-chart{display:flex;align-items:flex-end;gap:4px;height:140px;border-bottom:1px solid #3e3e42}.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}.bar{width:100%;min-height:1px}.bar.nudged{background:#3e3e42}.bar.clean{background:#4ec9b0}.bar-label{font-size:10px;color:#6a6a6a}.bar-legend{display:flex;gap:16px;margin-top:10px;justify-content:center}.bar-legend span{display:flex;align-items:center;gap:6px;font-size:11px;color:#969696}.bar-legend .dot{width:8px;height:8px;border:1px solid #4a4a4f}.cat-row{display:flex;align-items:center;gap:12px;padding:7px 0;border-bottom:1px solid #2d2d30}.cat-row:last-child{border-bottom:none}.cat-name{font-size:13px;width:150px;text-transform:capitalize}.cat-bar-bg{flex:1;height:8px;background:#2d2d30;overflow:hidden}.cat-bar-fill{height:100%;background:#4ec9b0}.cat-count{font-size:12px;color:#969696;width:36px;text-align:right}.knowledge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}.knowledge-chip{background:#2d2d30;border:1px solid #3e3e42;padding:14px}.knowledge-chip h4{font-size:13px;font-weight:600;text-transform:capitalize;margin-bottom:4px}.knowledge-chip .kc{font-size:11px;color:#4ec9b0}.knowledge-chip .kt{font-size:11px;color:#6a6a6a;margin-top:4px}.hidden{display:none!important}.muted{color:#6a6a6a;font-size:13px;font-style:italic}@media(max-width:700px){.stats-row{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr!important}}
</style>
</head>
<body>
<nav class="nav"><div class="nav-brand">Think</div><div class="nav-right"><img id="navPhoto" src="" alt="" class="hidden"><span id="navName"></span><button id="signoutBtn" class="hidden">Sign out</button></div></nav>
<div id="authView" class="auth-screen"><h1>Think</h1><p>Sign in to view your dashboard</p><button class="google-btn" id="googleBtn"><svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Sign in with Google</button></div>
<div id="dashView" class="container hidden">
<div class="stats-row"><div class="stat-card"><div class="num" id="sTotal">-</div><div class="label">Total</div></div><div class="stat-card"><div class="num" id="sNudged">-</div><div class="label">Nudged</div></div><div class="stat-card"><div class="num" id="sClean">-</div><div class="label">Clean</div></div><div class="stat-card"><div class="num" id="sRate">-</div><div class="label">Rate</div></div></div>
<div class="card"><h2>Last 7 Days</h2><div class="bar-chart" id="weekChart"></div><div class="bar-legend"><span><span class="dot" style="background:#4ec9b0"></span> Clean</span><span><span class="dot" style="background:#3e3e42"></span> Nudged</span></div></div>
<div class="two-col" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px"><div class="card"><h2>Categories</h2><div id="wCats" class="muted">Loading...</div></div><div class="card"><h2>Subjects</h2><div id="wSubjects" class="muted">Loading...</div></div></div>
<div class="card"><h2>Per-Site Usage</h2><div id="wSites" class="muted">Loading...</div></div>
<div class="card"><h2>Knowledge Map</h2><div class="knowledge-grid" id="wKnowledge"><span class="muted">Loading...</span></div></div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyBYomS5XmPZYEYYFbZPoe1-x6KvncliwS0",authDomain:"stanghacks.firebaseapp.com",projectId:"stanghacks",storageBucket:"stanghacks.firebasestorage.app",messagingSenderId:"1057477643029",appId:"1:1057477643029:web:eecee0d8a2432d924df71c"});
const auth=firebase.auth(),db=firebase.firestore(),provider=new firebase.auth.GoogleAuthProvider();
document.getElementById("googleBtn").addEventListener("click",()=>auth.signInWithPopup(provider));
document.getElementById("signoutBtn").addEventListener("click",()=>auth.signOut());
auth.onAuthStateChanged(async u=>{if(u){document.getElementById("authView").classList.add("hidden");document.getElementById("dashView").classList.remove("hidden");document.getElementById("navName").textContent=u.displayName||u.email;document.getElementById("signoutBtn").classList.remove("hidden");if(u.photoURL){const i=document.getElementById("navPhoto");i.src=u.photoURL;i.classList.remove("hidden")}await load(u.uid)}else{document.getElementById("authView").classList.remove("hidden");document.getElementById("dashView").classList.add("hidden");document.getElementById("signoutBtn").classList.add("hidden");document.getElementById("navPhoto").classList.add("hidden");document.getElementById("navName").textContent=""}});
async function load(uid){let t=0,n=0,c=0;const cats={},subjs={},sites={},daily=[];for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().split("T")[0];try{const doc=await db.collection("users").doc(uid).collection("dailyStats").doc(ds).get();if(doc.exists){const x=doc.data();t+=x.total||0;n+=x.nudged||0;c+=x.allowed||0;for(const[k,v]of Object.entries(x.categories||{}))cats[k]=(cats[k]||0)+v;for(const[k,v]of Object.entries(x.subjects||{}))subjs[k]=(subjs[k]||0)+v;for(const[k,v]of Object.entries(x.sites||{}))sites[k]=(sites[k]||0)+v;daily.push({date:ds,nudged:x.nudged||0,clean:x.allowed||0})}else daily.push({date:ds,nudged:0,clean:0})}catch(e){daily.push({date:ds,nudged:0,clean:0})}}
document.getElementById("sTotal").textContent=t;document.getElementById("sNudged").textContent=n;document.getElementById("sClean").textContent=c;document.getElementById("sRate").textContent=t>0?Math.round((n/t)*100)+"%":"0%";
chart(daily);bd("wCats",cats);bd("wSubjects",subjs);bd("wSites",sites);
const p=await db.collection("users").doc(uid).get();if(p.exists)kn(p.data().dynamicKnowledge||{})}
function chart(data){const el=document.getElementById("weekChart");el.innerHTML="";const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],ord=[...data].reverse(),mx=Math.max(...ord.map(d=>(d.nudged||0)+(d.clean||0)),1);ord.forEach(day=>{const g=document.createElement("div");g.className="bar-group";const cb=document.createElement("div");cb.className="bar clean";cb.style.height=Math.max(1,((day.clean||0)/mx)*120)+"px";const nb=document.createElement("div");nb.className="bar nudged";nb.style.height=Math.max(1,((day.nudged||0)/mx)*120)+"px";const lb=document.createElement("div");lb.className="bar-label";const d=new Date(day.date);lb.textContent=isNaN(d)?"?":days[d.getDay()];g.appendChild(cb);g.appendChild(nb);g.appendChild(lb);el.appendChild(g)})}
function bd(id,data){const el=document.getElementById(id),entries=Object.entries(data).sort((a,b)=>b[1]-a[1]);if(!entries.length){el.innerHTML='<span class="muted">No data</span>';return}const mx=Math.max(...entries.map(([,v])=>v),1);el.innerHTML=entries.map(([n,c])=>`<div class="cat-row"><div class="cat-name">${n.replace(/_/g," ")}</div><div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${(c/mx)*100}%"></div></div><div class="cat-count">${c}</div></div>`).join("")}
function kn(dk){const el=document.getElementById("wKnowledge"),entries=Object.entries(dk);if(!entries.length){el.innerHTML='<span class="muted">Populates as you use AI tools</span>';return}el.innerHTML=entries.sort((a,b)=>(b[1].promptCount||0)-(a[1].promptCount||0)).map(([s,d])=>`<div class="knowledge-chip"><h4>${s}</h4><div class="kc">${d.promptCount||0} prompts</div>${d.topics?.length?`<div class="kt">${d.topics.slice(-3).join(", ")}</div>`:""}</div>`).join("")}
</script>
</body>
</html>

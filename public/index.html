<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Think</title>
  <style>
    /* RESET & CORE */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      min-height: 100vh; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
      background: #f8f9fa; /* Light grey background */
      color: #333;         /* Standard dark text */
      line-height: 1.5;
    }

    /* NAVIGATION */
    .nav { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 15px 30px; 
      background: #ffffff; 
      border-bottom: 1px solid #ddd; 
    }
    .nav-brand { 
      font-size: 20px; 
      font-weight: 700; 
      color: #000;
    }
    .nav-right { 
      display: flex; 
      align-items: center; 
      gap: 15px; 
      font-size: 14px; 
      color: #666; 
    }
    .nav-right img { 
      width: 32px; 
      height: 32px; 
      border-radius: 50%; 
      border: 1px solid #ccc;
    }
    .nav-right button { 
      background: white; 
      border: 1px solid #ccc; 
      color: #333; 
      cursor: pointer; 
      font-size: 13px; 
      padding: 6px 12px;
      /* border-radius: 4px; */
    }
    .nav-right button:hover { background: #eee; }

    /* AUTH SCREEN */
    .auth-screen { 
      max-width: 400px; 
      margin: 100px auto; 
      text-align: center; 
      padding: 30px;
      background: white;
      border: 1px solid #ddd;
      /* border-radius: 8px; */
    }
    .auth-screen h1 { font-size: 24px; margin-bottom: 10px; color: #000; }
    .auth-screen p { color: #666; margin-bottom: 25px; }
    
    .google-btn {
      display: inline-flex; 
      align-items: center; 
      gap: 10px; 
      padding: 10px 20px;
      background: #fff; 
      color: #444; 
      font-size: 14px; 
      font-weight: 500;
      border: 1px solid #ccc; 
      /* border-radius: 4px;  */
      cursor: pointer; 
    }
    .google-btn:hover { background: #f0f0f0; }
    .google-btn svg { width: 18px; height: 18px; }

    /* DASHBOARD CONTAINER */
    .container { max-width: 1000px; margin: 0 auto; padding: 30px 20px; }
    
    /* STATS GRID */
    .stats-row { 
      display: grid; 
      grid-template-columns: repeat(4, 1fr); 
      gap: 15px; 
      margin-bottom: 20px; 
    }
    .stat-card { 
      background: #ffffff; 
      border: 1px solid #ddd; 
      /* border-radius: 6px;  */
      padding: 20px; 
    }
    .stat-card .num { 
      font-size: 32px; 
      font-weight: 700; 
      color: #222; 
    }
    .stat-card .label { 
      font-size: 12px; 
      color: #666; 
      text-transform: uppercase; 
      margin-top: 5px; 
    }

    /* GENERAL CARDS */
    .card { 
      background: #ffffff; 
      border: 1px solid #ddd; 
      /* border-radius: 6px;  */
      padding: 20px; 
      margin-bottom: 20px; 
    }
    .card h2 { 
      font-size: 16px; 
      font-weight: 600; 
      color: #111; 
      margin-bottom: 15px; 
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }

    /* CATEGORY BARS */
    .cat-row { 
      display: flex; 
      align-items: center; 
      gap: 15px; 
      padding: 8px 0; 
      border-bottom: 1px solid #f0f0f0; 
    }
    .cat-row:last-child { border-bottom: none; }
    .cat-name { 
      font-size: 14px; 
      width: 150px; 
      color: #333;
      text-transform: capitalize; 
    }
    .cat-bar-bg { 
      flex: 1; 
      height: 10px; 
      background: #eee; 
      /* border-radius: 5px;  */
      overflow: hidden; 
    }
    .cat-bar-fill { 
      height: 100%; 
      background: #0056b3; /* Basic Blue */
    }
    .cat-count { 
      font-size: 13px; 
      color: #555; 
      width: 40px; 
      text-align: right; 
    }

    /* KNOWLEDGE GRID */
    .knowledge-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
      gap: 15px; 
    }
    .knowledge-chip { 
      background: #fff;
      border: 1px solid #ddd; 
      /* border-radius: 4px;  */
      padding: 15px; 
    }
    .knowledge-chip h4 { 
      font-size: 14px; 
      font-weight: 700; 
      color: #000; 
      margin-bottom: 5px;
      text-transform: capitalize; 
    }
    .knowledge-chip .kc { 
      font-size: 12px; 
      color: #0056b3; 
      margin-bottom: 5px;
    }
    .knowledge-chip .kt { 
      font-size: 12px; 
      color: #666; 
    }

    /* UTILS */
    .hidden { display: none !important; }
    .muted { color: #888; font-size: 13px; font-style: italic; }
    
    @media (max-width: 700px) { 
      .stats-row { grid-template-columns: repeat(2, 1fr); } 
      .two-col { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-brand">Think</div>
    <div class="nav-right">
      <img id="navPhoto" src="" alt="" class="hidden">
      <span id="navName"></span>
      <button id="signoutBtn" class="hidden">Sign out</button>
    </div>
  </nav>

  <div id="authView" class="auth-screen">
    <h1>Think</h1>
    <p>Sign in to view your dashboard</p>
    <button class="google-btn" id="googleBtn">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
  </div>

  <div id="dashView" class="container hidden">
    <div class="stats-row">
      <div class="stat-card">
        <div class="num" id="sTotal">-</div>
        <div class="label">Total Prompts</div>
      </div>
      <div class="stat-card">
        <div class="num" id="sNudged">-</div>
        <div class="label">Nudged</div>
      </div>
      <div class="stat-card">
        <div class="num" id="sClean">-</div>
        <div class="label">Clean</div>
      </div>
      <div class="stat-card">
        <div class="num" id="sRate">-</div>
        <div class="label">Nudge Rate</div>
      </div>
    </div>

    <div class="two-col" style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px;">
      <div class="card">
        <h2>Categories (7 days)</h2>
        <div id="wCats" class="muted">Loading...</div>
      </div>
      <div class="card">
        <h2>Subjects</h2>
        <div id="wSubjects" class="muted">Loading...</div>
      </div>
    </div>

    <div class="card">
      <h2>Knowledge Map</h2>
      <div class="knowledge-grid" id="wKnowledge">
        <span class="muted">Loading...</span>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyBYomS5XmPZYEYYFbZPoe1-x6KvncliwS0",
      authDomain: "stanghacks.firebaseapp.com",
      projectId: "stanghacks",
      storageBucket: "stanghacks.firebasestorage.app",
      messagingSenderId: "1057477643029",
      appId: "1:1057477643029:web:eecee0d8a2432d924df71c",
    });
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    document.getElementById("googleBtn").addEventListener("click", () => auth.signInWithPopup(provider));
    document.getElementById("signoutBtn").addEventListener("click", () => auth.signOut());

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        document.getElementById("authView").classList.add("hidden");
        document.getElementById("dashView").classList.remove("hidden");
        document.getElementById("navName").textContent = user.displayName || user.email;
        document.getElementById("signoutBtn").classList.remove("hidden");
        if (user.photoURL) { const img = document.getElementById("navPhoto"); img.src = user.photoURL; img.classList.remove("hidden"); }
        await loadDashboard(user.uid);
      } else {
        document.getElementById("authView").classList.remove("hidden");
        document.getElementById("dashView").classList.add("hidden");
        document.getElementById("signoutBtn").classList.add("hidden");
        document.getElementById("navPhoto").classList.add("hidden");
        document.getElementById("navName").textContent = "";
      }
    });

    async function loadDashboard(uid) {
      let total = 0, nudged = 0, clean = 0;
      const cats = {}, subjs = {};
      for (let i = 0; i < 7; i++) {
        const d = new Date(); d.setDate(d.getDate() - i);
        const ds = d.toISOString().split("T")[0];
        try {
          const doc = await db.collection("users").doc(uid).collection("dailyStats").doc(ds).get();
          if (doc.exists) {
            const x = doc.data();
            total += x.total || 0; nudged += x.nudged || 0; clean += x.allowed || 0;
            for (const [k, v] of Object.entries(x.categories || {})) cats[k] = (cats[k] || 0) + v;
            for (const [k, v] of Object.entries(x.subjects || {})) subjs[k] = (subjs[k] || 0) + v;
          }
        } catch (e) { console.warn(e); }
      }

      document.getElementById("sTotal").textContent = total;
      document.getElementById("sNudged").textContent = nudged;
      document.getElementById("sClean").textContent = clean;
      document.getElementById("sRate").textContent = total > 0 ? Math.round((nudged / total) * 100) + "%" : "0%";

      renderBreakdown("wCats", cats);
      renderBreakdown("wSubjects", subjs);

      const profileDoc = await db.collection("users").doc(uid).get();
      if (profileDoc.exists) renderKnowledge(profileDoc.data().dynamicKnowledge || {});
    }

    function renderBreakdown(id, data) {
      const el = document.getElementById(id);
      const entries = Object.entries(data).sort((a, b) => b[1] - a[1]);
      if (!entries.length) { el.innerHTML = '<span class="muted">No data available yet</span>'; return; }
      const max = Math.max(...entries.map(([, v]) => v), 1);
      
      el.innerHTML = entries.map(([n, c]) => `
        <div class="cat-row">
          <div class="cat-name">${n.replace(/_/g, " ")}</div>
          <div class="cat-bar-bg">
            <div class="cat-bar-fill" style="width:${(c/max)*100}%"></div>
          </div>
          <div class="cat-count">${c}</div>
        </div>
      `).join("");
    }

    function renderKnowledge(dk) {
      const el = document.getElementById("wKnowledge");
      const entries = Object.entries(dk);
      if (!entries.length) { el.innerHTML = '<span class="muted">Dynamically adds as you use it</span>'; return; }
      
      el.innerHTML = entries.sort((a, b) => (b[1].promptCount||0) - (a[1].promptCount||0)).map(([s, d]) => `
        <div class="knowledge-chip">
          <h4>${s}</h4>
          <div class="kc">${d.promptCount||0} prompts</div>
          ${d.topics?.length ? `<div class="kt">${d.topics.slice(-3).join(", ")}</div>` : ""}
        </div>
      `).join("");
    }
  </script>
</body>
</html>
